<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파수의 등대 — 포트폴리오</title>
    <link rel="stylesheet" href="/static/style.css?v={{ asset_version }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="watermark-lighthouse-center"></div>
<div class="watermark-artifact artifact-coin artifact-1"></div>
<div class="watermark-artifact artifact-arrow artifact-2"></div>
<div class="watermark-artifact artifact-coin artifact-3"></div>
<div class="watermark-artifact artifact-arrow artifact-4"></div>
<div class="watermark-artifact artifact-coin artifact-5"></div>
<div class="watermark-artifact artifact-arrow artifact-6"></div>
<nav class="topbar">
    <h1><span class="brand-mark"><i data-lucide="telescope" class="icon-sm"></i></span><span>파수의 등대</span></h1>
    <div class="tabs">
        <a href="/"><i data-lucide="newspaper" class="icon-xs"></i>뉴스</a>
        <a href="/watchlist" class="active"><i data-lucide="briefcase" class="icon-xs"></i>포트폴리오</a>
        <a href="/calendar"><i data-lucide="calendar-days" class="icon-xs"></i>캘린더</a>
        <a href="/dashboard"><i data-lucide="activity" class="icon-xs"></i>지표</a>
    </div>
</nav>

<main class="feed">
    <form class="add-form" onsubmit="addItem(event)">
        <div class="form-row">
            <div class="autocomplete-wrap">
                <input type="text" id="name" placeholder="종목명 검색 (예: 삼성전자)" required autocomplete="off">
                <div class="autocomplete-dropdown" id="suggestions"></div>
            </div>
            <input type="text" id="ticker" placeholder="티커 자동입력" readonly class="ticker-readonly">
            <select id="market" disabled>
                <option value="KOSPI">KOSPI</option>
                <option value="KOSDAQ">KOSDAQ</option>
                <option value="ETF">ETF</option>
            </select>
            <input type="hidden" id="type" value="stock">
            <button type="submit" class="btn-add">종목 추가</button>
            <button type="button" class="btn-ocr" onclick="document.getElementById('ocr-file').click()" title="포트폴리오 사진으로 종목 추가">
                <i data-lucide="camera" class="icon-sm"></i> 사진 추가
            </button>
            <input type="file" id="ocr-file" accept="image/*" style="display:none" onchange="uploadPortfolioImage(this)">
        </div>
    </form>

    <!-- OCR 결과 영역 -->
    <div class="ocr-results" id="ocr-results" style="display:none">
        <div class="ocr-header">
            <span class="ocr-title"><i data-lucide="sparkles" class="icon-sm icon-accent"></i> 인식된 종목</span>
            <span class="ocr-status" id="ocr-status"></span>
            <button class="ocr-close" onclick="closeOcrResults()"><i data-lucide="x" class="icon-sm"></i></button>
        </div>
        <div class="ocr-table-wrap">
            <table class="ocr-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="ocr-select-all" onchange="toggleAllOcr(this)" checked></th>
                        <th>종목명</th>
                        <th>티커</th>
                        <th>수량</th>
                        <th>매칭률</th>
                    </tr>
                </thead>
                <tbody id="ocr-tbody"></tbody>
            </table>
        </div>
        <div class="ocr-actions">
            <button class="btn-add" onclick="batchAddOcr()"><i data-lucide="plus" class="icon-xs"></i> 선택한 종목 추가</button>
            <span class="ocr-hint" id="ocr-hint"></span>
        </div>
        <div class="ocr-loading" id="ocr-loading" style="display:none">
            <i data-lucide="loader-circle" class="icon-sm spin"></i> 이미지 분석 중...
        </div>
    </div>

    <div class="portfolio-table-wrap">
        {% if items %}
        <table class="portfolio-table">
            <thead>
                <tr>
                    <th>구분</th>
                    <th>티커</th>
                    <th>종목명</th>
                    <th>시장</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="item-list">
                {% for item in items %}
                <tr data-id="{{ item.id }}">
                    <td><span class="badge badge-{{ item.type }}">{{ 'ETF' if item.type == 'etf' else '주식' }}</span></td>
                    <td class="mono">{{ item.ticker }}</td>
                    <td>{{ item.name }}</td>
                    <td>{{ item.market }}</td>
                    <td><button class="btn-del" onclick="deleteItem({{ item.id }}, this)" title="삭제" aria-label="삭제"><i data-lucide="x" class="icon-sm"></i></button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty">
            <p class="empty-title">관심 종목을 추가해보세요</p>
            <p class="empty-sub">관심 종목을 추가하면 관련 뉴스가 여기에 표시됩니다</p>
        </div>
        {% endif %}
    </div>
</main>

<script>
if (window.lucide) lucide.createIcons();

let debounceTimer;

document.getElementById('name').addEventListener('input', function() {
    clearTimeout(debounceTimer);
    const q = this.value.trim();
    if (q.length < 1) {
        document.getElementById('suggestions').classList.remove('show');
        return;
    }
    debounceTimer = setTimeout(() => fetchSuggestions(q), 200);
});

document.getElementById('name').addEventListener('focus', function() {
    if (this.value.trim().length >= 1 && document.getElementById('suggestions').children.length > 0) {
        document.getElementById('suggestions').classList.add('show');
    }
});

document.addEventListener('click', function(e) {
    if (!e.target.closest('.autocomplete-wrap')) {
        document.getElementById('suggestions').classList.remove('show');
    }
});

async function fetchSuggestions(q) {
    const dropdown = document.getElementById('suggestions');
    try {
        const resp = await fetch('/api/search?q=' + encodeURIComponent(q));
        const results = await resp.json();
        dropdown.innerHTML = '';
        if (results.length === 0) {
            dropdown.innerHTML = '<div class="ac-item no-result">검색 결과가 없어요</div>';
        } else {
            results.forEach(r => {
                const div = document.createElement('div');
                div.className = 'ac-item';
                div.innerHTML = `
                    <span class="ac-name">${r.name}</span>
                    <span class="ac-meta">
                        <span class="badge badge-${r.type}">${r.type === 'etf' ? 'ETF' : '주식'}</span>
                        <span class="ac-ticker">${r.ticker}</span>
                        <span class="ac-market">${r.market}</span>
                    </span>
                `;
                div.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    selectStock(r);
                });
                dropdown.appendChild(div);
            });
        }
        dropdown.classList.add('show');
    } catch(e) {
        console.error(e);
    }
}

function selectStock(stock) {
    document.getElementById('name').value = stock.name;
    document.getElementById('ticker').value = stock.ticker;
    document.getElementById('market').value = stock.market;
    document.getElementById('type').value = stock.type;
    document.getElementById('suggestions').classList.remove('show');
}

async function addItem(e) {
    e.preventDefault();
    const ticker = document.getElementById('ticker').value.trim();
    const name = document.getElementById('name').value.trim();
    const market = document.getElementById('market').value;
    const type = document.getElementById('type').value;
    if (!ticker || !name) return;

    const formData = new FormData();
    formData.append('ticker', ticker);
    formData.append('name', name);
    formData.append('type', type);
    formData.append('market', market);

    await fetch('/watchlist', { method: 'POST', body: formData });
    location.reload();
}

async function deleteItem(id, btn) {
    await fetch('/watchlist/delete/' + id, { method: 'POST' });
    const row = btn.closest('tr');
    row.style.transition = 'opacity 0.3s';
    row.style.opacity = '0';
    setTimeout(() => {
        row.remove();
        if (document.querySelectorAll('#item-list tr').length === 0) {
            location.reload();
        }
    }, 300);
}

// OCR 포트폴리오 업로드
let ocrResults = [];

async function uploadPortfolioImage(input) {
    const file = input.files[0];
    if (!file) return;
    
    const panel = document.getElementById('ocr-results');
    const loading = document.getElementById('ocr-loading');
    const tbody = document.getElementById('ocr-tbody');
    const status = document.getElementById('ocr-status');
    
    panel.style.display = 'block';
    loading.style.display = 'flex';
    tbody.innerHTML = '';
    status.textContent = '분석 중...';
    
    const formData = new FormData();
    formData.append('image', file);
    
    try {
        const resp = await fetch('/api/portfolio/ocr', { method: 'POST', body: formData });
        const data = await resp.json();
        loading.style.display = 'none';
        
        if (data.status === 'ok') {
            ocrResults = data.stocks;
            status.textContent = `${ocrResults.length}종목 인식됨`;
            renderOcrResults();
        } else {
            status.textContent = '❌ ' + (data.message || '인식 실패');
        }
    } catch(e) {
        loading.style.display = 'none';
        status.textContent = '❌ 서버 오류';
        console.error(e);
    }
    
    if (window.lucide) lucide.createIcons();
}

function renderOcrResults() {
    const tbody = document.getElementById('ocr-tbody');
    tbody.innerHTML = ocrResults.map((s, i) => `
        <tr class="${s.confidence < 0.6 ? 'ocr-low-conf' : ''}">
            <td><input type="checkbox" class="ocr-cb" data-idx="${i}" checked></td>
            <td>
                <span class="ocr-name">${s.name}</span>
                ${s.raw_ocr !== s.name ? `<span class="ocr-raw">OCR: ${s.raw_ocr}</span>` : ''}
            </td>
            <td class="mono">${s.ticker}</td>
            <td>${s.quantity}주</td>
            <td><span class="ocr-conf ${s.confidence >= 0.8 ? 'ocr-conf-high' : s.confidence >= 0.6 ? 'ocr-conf-mid' : 'ocr-conf-low'}">${Math.round(s.confidence * 100)}%</span></td>
        </tr>
    `).join('');
    document.getElementById('ocr-select-all').checked = true;
    if (window.lucide) lucide.createIcons();
}

function toggleAllOcr(cb) {
    document.querySelectorAll('.ocr-cb').forEach(c => c.checked = cb.checked);
}

function closeOcrResults() {
    document.getElementById('ocr-results').style.display = 'none';
    ocrResults = [];
    document.getElementById('ocr-file').value = '';
}

async function batchAddOcr() {
    const selected = [];
    document.querySelectorAll('.ocr-cb:checked').forEach(cb => {
        const idx = parseInt(cb.dataset.idx);
        selected.push(ocrResults[idx]);
    });
    
    if (selected.length === 0) return;
    
    const hint = document.getElementById('ocr-hint');
    hint.textContent = '추가 중...';
    
    try {
        const resp = await fetch('/api/portfolio/batch-add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({stocks: selected})
        });
        const data = await resp.json();
        hint.textContent = `${data.added}종목 추가 완료`;
        setTimeout(() => location.reload(), 800);
    } catch(e) {
        hint.textContent = '❌ 추가 실패';
        console.error(e);
    }
}
</script>
</body>
</html>
